<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #1f2937;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .quote-box {
      background: #111827;
      padding: 24px;
      border-radius: 14px;
      font-size: 1.4rem;
      line-height: 2.1rem;
      min-height: 140px;
      margin-bottom: 20px;
      user-select: none;
    }

    .char {
      color: #9ca3af;
    }

    .char.correct {
      color: #f9fafb;
    }

    .char.incorrect {
      color: #f87171;
      background: rgba(248, 113, 113, 0.15);
      border-radius: 3px;
    }

    .char.current {
      background: rgba(96, 165, 250, 0.35);
      border-radius: 3px;
    }

    textarea {
      width: 100%;
      height: 130px;
      border: none;
      outline: none;
      resize: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 1.1rem;
      background: #374151;
      color: #f9fafb;
      margin-bottom: 18px;
    }

    textarea::placeholder {
      color: #cbd5e1;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .done {
      margin-top: 18px;
      font-size: 1.1rem;
      color: #86efac;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .quote-box {
        font-size: 1.15rem;
        line-height: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Typing Speed Test</h1>
    <div class="subtitle">Type the text below as fast and accurately as your fragile human fingers allow.</div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">0s</div>
      </div>
      <div class="stat">
        <div class="stat-label">WPM</div>
        <div class="stat-value" id="wpm">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracy">100%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Characters</div>
        <div class="stat-value" id="chars">0</div>
      </div>
    </div>

    <div class="quote-box" id="quote"></div>

    <textarea id="input" placeholder="Start typing here..."></textarea>

    <div class="controls">
      <button id="restart">Restart</button>
    </div>

    <div class="done" id="doneMessage"></div>
  </div>

  <script>
    const quotes = [
      "The quick brown fox jumps over the lazy dog.",
      "Success usually comes to those who are too busy to be looking for it.",
      "Discipline is choosing between what you want now and what you want most.",
      "Small daily improvements are the key to staggering long term results.",
      "A calm mind brings inner strength and self confidence."
    ];

    const quoteEl = document.getElementById("quote");
    const inputEl = document.getElementById("input");
    const timeEl = document.getElementById("time");
    const wpmEl = document.getElementById("wpm");
    const accuracyEl = document.getElementById("accuracy");
    const charsEl = document.getElementById("chars");
    const doneMessageEl = document.getElementById("doneMessage");
    const restartBtn = document.getElementById("restart");

    let currentQuote = "";
    let startTime = null;
    let timerInterval = null;
    let finished = false;

    function getRandomQuote() {
      return quotes[Math.floor(Math.random() * quotes.length)];
    }

    function renderQuote() {
      quoteEl.innerHTML = "";
      currentQuote.split("").forEach((char, index) => {
        const span = document.createElement("span");
        span.innerText = char;
        span.classList.add("char");
        if (index === 0) span.classList.add("current");
        quoteEl.appendChild(span);
      });
    }

    function resetTest() {
      currentQuote = getRandomQuote();
      inputEl.value = "";
      startTime = null;
      finished = false;
      doneMessageEl.textContent = "";
      clearInterval(timerInterval);
      timerInterval = null;

      timeEl.textContent = "0s";
      wpmEl.textContent = "0";
      accuracyEl.textContent = "100%";
      charsEl.textContent = "0";

      renderQuote();
      inputEl.disabled = false;
      inputEl.focus();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        if (!startTime) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timeEl.textContent = elapsed + "s";
      }, 100);
    }

    function updateStats() {
      const typed = inputEl.value;
      const quoteChars = quoteEl.querySelectorAll(".char");

      let correctChars = 0;
      let incorrectChars = 0;

      quoteChars.forEach((span, index) => {
        const typedChar = typed[index];
        span.classList.remove("correct", "incorrect", "current");

        if (typedChar == null) {
          if (index === typed.length) {
            span.classList.add("current");
          }
        } else if (typedChar === span.innerText) {
          span.classList.add("correct");
          correctChars++;
        } else {
          span.classList.add("incorrect");
          incorrectChars++;
        }
      });

      charsEl.textContent = typed.length;

      const totalTyped = typed.length;
      const accuracy = totalTyped === 0
        ? 100
        : Math.round((correctChars / totalTyped) * 100);
      accuracyEl.textContent = accuracy + "%";

      if (startTime) {
        const minutes = (Date.now() - startTime) / 1000 / 60;
        const wordsTyped = typed.trim().length / 5;
        const wpm = minutes > 0 ? Math.round(wordsTyped / minutes) : 0;
        wpmEl.textContent = wpm;
      }

      if (typed === currentQuote && !finished) {
        finished = true;
        clearInterval(timerInterval);

        const totalMinutes = (Date.now() - startTime) / 1000 / 60;
        const finalWpm = totalMinutes > 0
          ? Math.round((typed.length / 5) / totalMinutes)
          : 0;

        wpmEl.textContent = finalWpm;
        doneMessageEl.textContent = `Finished! Final speed: ${finalWpm} WPM`;
        inputEl.disabled = true;
      }
    }

    inputEl.addEventListener("input", () => {
      if (!startTime) {
        startTime = Date.now();
        startTimer();
      }
      updateStats();
    });

    restartBtn.addEventListener("click", resetTest);

    resetTest();
  </script>
</body>
</html>
